<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
        }
        .back-link:hover {
            color: #2980b9;
        }
        .current-info {
            margin-bottom: 20px;
            text-align: center;
        }
        .current-info label {
            display: inline-block;
            margin: 0 10px;
        }
        .current-info input {
            width: 100px;
            padding: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #ecf0f1;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }
        .gpa-display {
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
        }
        .controls {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <a href="/lastproject/resume.html" class="back-link">About the Creator</a>
        <h1>GPA Calculator</h1>
        <div class="current-info">
            <label>Current GPA: <input type="number" id="current-gpa" step="0.01" min="0" max="4.0" onchange="calculateGPA()"></label>
            <label>Total Credits Earned: <input type="number" id="total-credits" min="0" step="0.5" onchange="calculateGPA()"></label>
        </div>
    </header>
    <table id="courses-table">
        <thead>
            <tr>
                <th>Course Name</th>
                <th>Grade</th>
                <th>Credits</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="courses-body">
            <!-- Rows will be added here -->
        </tbody>
    </table>
    <div class="controls">
        <button onclick="addRow()">Add Course</button>
        <button onclick="clearAll()">Clear All</button>
    </div>
    <div class="gpa-display">
        Semester GPA: <span id="semester-gpa">0.00</span><br>
        Cumulative GPA: <span id="cumulative-gpa">0.00</span>
    </div>
    <script>
        function addRow() {
            const tbody = document.getElementById('courses-body');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="text" placeholder="Course Name"></td>
                <td>
                    <select onchange="calculateGPA()">
                        <option value="">Select Grade</option>
                        <option value="4.0">A</option>
                        <option value="3.7">A-</option>
                        <option value="3.3">B+</option>
                        <option value="3.0">B</option>
                        <option value="2.7">B-</option>
                        <option value="2.3">C+</option>
                        <option value="2.0">C</option>
                        <option value="1.7">C-</option>
                        <option value="1.3">D+</option>
                        <option value="1.0">D</option>
                        <option value="0.7">D-</option>
                        <option value="0.0">F</option>
                        <option value="P">P</option>
                        <option value="CR">CR</option>
                        <option value="W">W</option>
                    </select>
                </td>
                <td><input type="number" min="0" step="0.5" placeholder="Credits" onchange="calculateGPA()"></td>
                <td><button onclick="removeRow(this)">Remove</button></td>
            `;
            tbody.appendChild(row);
        }

        function removeRow(button) {
            button.closest('tr').remove();
            calculateGPA();
        }

        function calculateGPA() {
            const rows = document.querySelectorAll('#courses-body tr');
            let semesterPoints = 0;
            let semesterCredits = 0;
            rows.forEach(row => {
                const gradeSelect = row.querySelector('select');
                const creditsInput = row.querySelector('input[type="number"]');
                const grade = parseFloat(gradeSelect.value);
                const credits = parseFloat(creditsInput.value);
                if (!isNaN(grade) && !isNaN(credits) && credits > 0) {
                    semesterPoints += grade * credits;
                    semesterCredits += credits;
                }
            });
            const semesterGPA = semesterCredits > 0 ? (semesterPoints / semesterCredits).toFixed(2) : '0.00';
            document.getElementById('semester-gpa').textContent = semesterGPA;

            // Cumulative
            const currentGPA = parseFloat(document.getElementById('current-gpa').value) || 0;
            const totalCredits = parseFloat(document.getElementById('total-credits').value) || 0;
            const previousPoints = currentGPA * totalCredits;
            const totalPoints = previousPoints + semesterPoints;
            const totalCreditsAll = totalCredits + semesterCredits;
            const cumulativeGPA = totalCreditsAll > 0 ? (totalPoints / totalCreditsAll).toFixed(2) : '0.00';
            document.getElementById('cumulative-gpa').textContent = cumulativeGPA;
        }

        function clearAll() {
            document.getElementById('courses-body').innerHTML = '';
            document.getElementById('gpa').textContent = '0.00';
        }
    </script>
</body>
</html>
